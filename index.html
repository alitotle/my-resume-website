<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coding Learner | Links</title>
    <meta
      name="description"
      content="Coding Learner — a modern personal link page with social links."
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            boxShadow: {
              glow: "0 0 0 1px rgba(255,255,255,0.08), 0 18px 60px rgba(0,0,0,0.55)",
            },
          },
        },
      };
    </script>
  </head>

  <body class="min-h-dvh bg-slate-950 text-slate-100 antialiased">
    <!-- Background -->
    <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
      <div
        class="absolute inset-0 bg-gradient-to-b from-slate-950 via-slate-950 to-slate-900"
      ></div>
      <div
        class="absolute -left-24 -top-24 h-80 w-80 rounded-full bg-fuchsia-500/20 blur-3xl"
      ></div>
      <div
        class="absolute -right-24 top-24 h-96 w-96 rounded-full bg-cyan-400/20 blur-3xl"
      ></div>
      <div
        class="absolute left-1/3 bottom-[-8rem] h-[28rem] w-[28rem] rounded-full bg-indigo-500/15 blur-3xl"
      ></div>
    </div>

    <main class="mx-auto flex min-h-dvh max-w-xl items-center px-5 py-10">
      <section
        class="w-full rounded-3xl border border-white/10 bg-white/5 p-6 shadow-glow backdrop-blur sm:p-8"
        aria-label="Personal link page"
      >
        <header class="text-center">
          <div class="mx-auto w-fit">
            <div
              class="relative rounded-full bg-gradient-to-br from-fuchsia-400/30 via-cyan-300/25 to-indigo-400/30 p-[2px]"
            >
              <img
                src="https://placehold.co/160x160/png?text=Profile"
                alt="Profile picture placeholder"
                class="h-28 w-28 rounded-full border border-white/10 object-cover sm:h-32 sm:w-32"
              />
            </div>
          </div>

          <h1 class="mt-5 text-2xl font-semibold tracking-tight sm:text-3xl">
            Coding Learner
          </h1>
          <p class="mt-2 text-sm leading-relaxed text-slate-300 sm:text-base">
            Building projects, learning daily, and sharing my journey in software development.
          </p>
        </header>

        <div class="mt-7 space-y-3">
          <a
            href="#"
            class="group flex w-full items-center justify-between gap-3 rounded-2xl border border-white/10 bg-white/5 px-5 py-4 text-left transition hover:-translate-y-0.5 hover:border-white/20 hover:bg-white/10 hover:shadow-lg focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300/60"
            aria-label="Open GitHub"
          >
            <span class="flex items-center gap-3">
              <span
                class="grid h-10 w-10 place-items-center rounded-xl bg-slate-900/60 ring-1 ring-white/10 transition group-hover:ring-white/20"
                aria-hidden="true"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  class="h-5 w-5 text-slate-200"
                >
                  <path
                    d="M12 .5C5.73.5.75 5.62.75 12.09c0 5.18 3.32 9.58 7.93 11.13.58.11.79-.26.79-.57v-2.06c-3.23.72-3.91-1.6-3.91-1.6-.53-1.4-1.3-1.77-1.3-1.77-1.06-.75.08-.74.08-.74 1.17.08 1.78 1.25 1.78 1.25 1.04 1.85 2.72 1.32 3.38 1.01.11-.78.41-1.32.74-1.62-2.58-.3-5.29-1.33-5.29-5.92 0-1.31.45-2.38 1.19-3.22-.12-.3-.52-1.52.11-3.17 0 0 .97-.32 3.18 1.23.92-.26 1.9-.39 2.88-.4.98.01 1.96.14 2.88.4 2.21-1.55 3.18-1.23 3.18-1.23.63 1.65.23 2.87.11 3.17.74.84 1.19 1.91 1.19 3.22 0 4.6-2.72 5.62-5.31 5.92.42.37.79 1.1.79 2.23v3.3c0 .31.21.68.8.57 4.6-1.55 7.92-5.95 7.92-11.13C23.25 5.62 18.27.5 12 .5z"
                  />
                </svg>
              </span>
              <span>
                <span class="block font-medium">GitHub</span>
                <span class="block text-xs text-slate-400 sm:text-sm"
                  >View my code & projects</span
                >
              </span>
            </span>
            <span
              class="text-slate-400 transition group-hover:translate-x-0.5 group-hover:text-slate-200"
              aria-hidden="true"
            >
              →
            </span>
          </a>

          <a
            href="#"
            class="group flex w-full items-center justify-between gap-3 rounded-2xl border border-white/10 bg-white/5 px-5 py-4 text-left transition hover:-translate-y-0.5 hover:border-white/20 hover:bg-white/10 hover:shadow-lg focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300/60"
            aria-label="Open LinkedIn"
          >
            <span class="flex items-center gap-3">
              <span
                class="grid h-10 w-10 place-items-center rounded-xl bg-slate-900/60 ring-1 ring-white/10 transition group-hover:ring-white/20"
                aria-hidden="true"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  class="h-5 w-5 text-slate-200"
                >
                  <path
                    d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.05-1.86-3.05-1.86 0-2.15 1.45-2.15 2.95v5.67H9.34V9h3.41v1.56h.05c.47-.9 1.62-1.86 3.33-1.86 3.56 0 4.22 2.34 4.22 5.38v6.37zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45z"
                  />
                </svg>
              </span>
              <span>
                <span class="block font-medium">LinkedIn</span>
                <span class="block text-xs text-slate-400 sm:text-sm"
                  >Connect professionally</span
                >
              </span>
            </span>
            <span
              class="text-slate-400 transition group-hover:translate-x-0.5 group-hover:text-slate-200"
              aria-hidden="true"
            >
              →
            </span>
          </a>

          <a
            href="#"
            class="group flex w-full items-center justify-between gap-3 rounded-2xl border border-white/10 bg-white/5 px-5 py-4 text-left transition hover:-translate-y-0.5 hover:border-white/20 hover:bg-white/10 hover:shadow-lg focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300/60"
            aria-label="Open Facebook"
          >
            <span class="flex items-center gap-3">
              <span
                class="grid h-10 w-10 place-items-center rounded-xl bg-slate-900/60 ring-1 ring-white/10 transition group-hover:ring-white/20"
                aria-hidden="true"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  class="h-5 w-5 text-slate-200"
                >
                  <path
                    d="M22 12.07C22 6.51 17.52 2 12 2S2 6.51 2 12.07c0 5.02 3.66 9.18 8.44 9.93v-7.02H7.9v-2.9h2.54V9.85c0-2.52 1.49-3.91 3.78-3.91 1.1 0 2.25.2 2.25.2v2.48h-1.27c-1.25 0-1.64.79-1.64 1.6v1.92h2.79l-.45 2.9h-2.34V22c4.78-.75 8.44-4.91 8.44-9.93z"
                  />
                </svg>
              </span>
              <span>
                <span class="block font-medium">Facebook</span>
                <span class="block text-xs text-slate-400 sm:text-sm"
                  >Say hi and follow along</span
                >
              </span>
            </span>
            <span
              class="text-slate-400 transition group-hover:translate-x-0.5 group-hover:text-slate-200"
              aria-hidden="true"
            >
              →
            </span>
          </a>
        </div>

        <footer class="mt-7 text-center text-xs text-slate-500">
          <p class="leading-relaxed">
            Tip: replace the <span class="text-slate-300">#</span> links with your real profiles.
          </p>
        </footer>
      </section>
    </main>
  </body>
</html>
