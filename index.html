<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coding Learner | Links</title>
    <meta
      name="description"
      content="Coding Learner — a modern personal link page with social links."
    />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            boxShadow: {
              glow: "0 0 0 1px rgba(255,255,255,0.08), 0 18px 60px rgba(0,0,0,0.55)",
            },
          },
        },
      };
    </script>

    <!-- Spline Viewer (3D embed) -->
    <script type="module" src="https://unpkg.com/@splinetool/viewer/build/spline-viewer.js"></script>
  </head>

  <body class="min-h-dvh bg-slate-950 text-slate-100 antialiased">
    <div class="fixed inset-x-0 top-0 z-10 flex justify-end px-5 py-4">
      <button
        id="theme-toggle"
        type="button"
        class="inline-flex items-center gap-2 rounded-full border border-white/15 bg-black/30 px-3 py-1.5 text-xs font-medium text-slate-100 shadow-sm backdrop-blur hover:border-white/30 hover:bg-black/50 focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300/60"
      >
        <span class="h-2 w-2 rounded-full bg-emerald-400"></span>
        <span class="hidden sm:inline">Dark mode</span>
        <span class="sm:hidden">DM</span>
      </button>
    </div>

    <!-- Welcome overlay -->
    <div
      id="welcome-overlay"
      class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/90 backdrop-blur-sm transition-opacity duration-700 opacity-100"
      role="dialog"
      aria-modal="true"
      aria-labelledby="welcome-title"
    >
      <div class="mx-auto w-full max-w-md px-6 text-center">
        <h2
          id="welcome-title"
          class="text-2xl font-semibold tracking-tight text-slate-100 sm:text-3xl"
        >
          Welcome
        </h2>
        <p class="mt-2 text-sm text-slate-300 sm:text-base">
          Your link tree is loading...
        </p>

        <button
          id="enter-button"
          type="button"
          class="mt-6 inline-flex items-center justify-center rounded-full bg-slate-100 px-5 py-2.5 text-sm font-medium text-slate-900 shadow-lg transition hover:bg-slate-200 focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300/70"
        >
          Click to Enter
        </button>
      </div>
    </div>

    <!-- Background -->
    <div class="pointer-events-none fixed inset-0 -z-10 overflow-hidden">
      <div
        class="absolute inset-0 bg-gradient-to-b from-slate-950 via-slate-950 to-slate-900"
      ></div>
      <div
        class="absolute -left-24 -top-24 h-80 w-80 rounded-full bg-fuchsia-500/20 blur-3xl"
      ></div>
      <div
        class="absolute -right-24 top-24 h-96 w-96 rounded-full bg-cyan-400/20 blur-3xl"
      ></div>
      <div
        class="absolute left-1/3 bottom-[-8rem] h-[28rem] w-[28rem] rounded-full bg-indigo-500/15 blur-3xl"
      ></div>
    </div>

    <!-- 3D background -->
    <div class="pointer-events-none fixed inset-0 z-0 overflow-hidden">
      <div
        id="spline-wrap"
        class="relative h-full w-full transform-gpu will-change-transform"
      >
        <!-- Replace url with your own Spline export URL -->
        <spline-viewer
          url="https://prod.spline.design/S8o9DE-254xyJ0lv/scene.splinecode"
          style="position: absolute; inset: 0; width: 100%; height: 100%"
          background="transparent"
        ></spline-viewer>
      </div>
    </div>

    <main
      id="link-tree"
      class="relative z-10 mx-auto flex min-h-dvh max-w-xl items-center px-5 py-10 opacity-0 translate-y-8 transition-all duration-700 ease-out"
    >
      <section
        class="w-full rounded-3xl border border-white/10 bg-white/5 p-6 shadow-glow backdrop-blur sm:p-8"
        aria-label="Personal link page"
      >
        <header class="text-center">
          <div class="mx-auto w-fit">
            <div
              class="relative rounded-full bg-gradient-to-br from-fuchsia-400/30 via-cyan-300/25 to-indigo-400/30 p-[2px]"
            >
              <img
                src="S__29220867_0.jpg"
                alt="Profile picture placeholder"
                class="h-28 w-28 rounded-full border border-white/10 object-cover sm:h-32 sm:w-32"
              />
            </div>
          </div>

          <h1 class="mt-5 text-2xl font-semibold tracking-tight sm:text-3xl">
            Coding Learner
          </h1>
          <p class="mt-2 text-sm leading-relaxed text-slate-300 sm:text-base">
            Building projects, learning daily, and sharing my journey in software
            development.
          </p>

          <div class="mt-4 flex justify-center">
            <button
              id="contact-button"
              type="button"
              class="inline-flex items-center gap-2 rounded-full border border-cyan-400/70 bg-cyan-500/10 px-4 py-2 text-xs font-medium text-cyan-100 shadow-sm backdrop-blur hover:bg-cyan-400/20 hover:border-cyan-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300/70"
            >
              <span>Contact Me</span>
            </button>
          </div>
        </header>

        <div class="mt-7 space-y-3">
          <a
            href="https://github.com/alitotle"
            class="group flex w-full items-center justify-between gap-3 rounded-2xl border border-white/10 bg-white/5 px-5 py-4 text-left transition hover:-translate-y-0.5 hover:border-white/20 hover:bg-white/10 hover:shadow-lg focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300/60"
            aria-label="Open GitHub"
          >
            <span class="flex items-center gap-3">
              <span
                class="grid h-10 w-10 place-items-center rounded-xl bg-slate-900/60 ring-1 ring-white/10 transition group-hover:ring-white/20"
                aria-hidden="true"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  class="h-5 w-5 text-slate-200"
                >
                  <path
                    d="M12 .5C5.73.5.75 5.62.75 12.09c0 5.18 3.32 9.58 7.93 11.13.58.11.79-.26.79-.57v-2.06c-3.23.72-3.91-1.6-3.91-1.6-.53-1.4-1.3-1.77-1.3-1.77-1.06-.75.08-.74.08-.74 1.17.08 1.78 1.25 1.78 1.25 1.04 1.85 2.72 1.32 3.38 1.01.11-.78.41-1.32.74-1.62-2.58-.3-5.29-1.33-5.29-5.92 0-1.31.45-2.38 1.19-3.22-.12-.3-.52-1.52.11-3.17 0 0 .97-.32 3.18 1.23.92-.26 1.9-.39 2.88-.4.98.01 1.96.14 2.88.4 2.21-1.55 3.18-1.23 3.18-1.23.63 1.65.23 2.87.11 3.17.74.84 1.19 1.91 1.19 3.22 0 4.6-2.72 5.62-5.31 5.92.42.37.79 1.1.79 2.23v3.3c0 .31.21.68.8.57 4.6-1.55 7.92-5.95 7.92-11.13C23.25 5.62 18.27.5 12 .5z"
                  />
                </svg>
              </span>
              <span>
                <span class="block font-medium">GitHub</span>
                <span class="block text-xs text-slate-400 sm:text-sm"
                  >View my code & projects</span
                >
              </span>
            </span>
            <span
              class="text-slate-400 transition group-hover:translate-x-0.5 group-hover:text-slate-200"
              aria-hidden="true"
            >
              →
            </span>
          </a>

          <a
            href="https://www.linkedin.com/feed/"
            class="group flex w-full items-center justify-between gap-3 rounded-2xl border border-white/10 bg-white/5 px-5 py-4 text-left transition hover:-translate-y-0.5 hover:border-white/20 hover:bg-white/10 hover:shadow-lg focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300/60"
            aria-label="Open LinkedIn"
          >
            <span class="flex items-center gap-3">
              <span
                class="grid h-10 w-10 place-items-center rounded-xl bg-slate-900/60 ring-1 ring-white/10 transition group-hover:ring-white/20"
                aria-hidden="true"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  class="h-5 w-5 text-slate-200"
                >
                  <path
                    d="M20.45 20.45h-3.55v-5.57c0-1.33-.03-3.05-1.86-3.05-1.86 0-2.15 1.45-2.15 2.95v5.67H9.34V9h3.41v1.56h.05c.47-.9 1.62-1.86 3.33-1.86 3.56 0 4.22 2.34 4.22 5.38v6.37zM5.34 7.43a2.06 2.06 0 1 1 0-4.12 2.06 2.06 0 0 1 0 4.12zM7.12 20.45H3.56V9h3.56v11.45z"
                  />
                </svg>
              </span>
              <span>
                <span class="block font-medium">LinkedIn</span>
                <span class="block text-xs text-slate-400 sm:text-sm"
                  >Connect professionally</span
                >
              </span>
            </span>
            <span
              class="text-slate-400 transition group-hover:translate-x-0.5 group-hover:text-slate-200"
              aria-hidden="true"
            >
              →
            </span>
          </a>

          <a
            href="https://www.facebook.com/mrinnz"
            class="group flex w-full items-center justify-between gap-3 rounded-2xl border border-white/10 bg-white/5 px-5 py-4 text-left transition hover:-translate-y-0.5 hover:border-white/20 hover:bg-white/10 hover:shadow-lg focus:outline-none focus-visible:ring-2 focus-visible:ring-cyan-300/60"
            aria-label="Open Facebook"
          >
            <span class="flex items-center gap-3">
              <span
                class="grid h-10 w-10 place-items-center rounded-xl bg-slate-900/60 ring-1 ring-white/10 transition group-hover:ring-white/20"
                aria-hidden="true"
              >
                <svg
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  class="h-5 w-5 text-slate-200"
                >
                  <path
                    d="M22 12.07C22 6.51 17.52 2 12 2S2 6.51 2 12.07c0 5.02 3.66 9.18 8.44 9.93v-7.02H7.9v-2.9h2.54V9.85c0-2.52 1.49-3.91 3.78-3.91 1.1 0 2.25.2 2.25.2v2.48h-1.27c-1.25 0-1.64.79-1.64 1.6v1.92h2.79l-.45 2.9h-2.34V22c4.78-.75 8.44-4.91 8.44-9.93z"
                  />
                </svg>
              </span>
              <span>
                <span class="block font-medium">Facebook</span>
                <span class="block text-xs text-slate-400 sm:text-sm"
                  >Say hi and follow along</span
                >
              </span>
            </span>
            <span
              class="text-slate-400 transition group-hover:translate-x-0.5 group-hover:text-slate-200"
              aria-hidden="true"
            >
              →
            </span>
          </a>
        </div>

        <footer class="mt-7 text-center text-xs text-slate-500">
          <p class="leading-relaxed">
            Tip: replace the <span class="text-slate-300">#</span> links with your real profiles.
          </p>
        </footer>
      </section>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const body = document.body;
        const themeToggle = document.getElementById("theme-toggle");
        const contactButton = document.getElementById("contact-button");
        const welcomeOverlay = document.getElementById("welcome-overlay");
        const enterButton = document.getElementById("enter-button");
        const linkTree = document.getElementById("link-tree");
        const splineWrap = document.getElementById("spline-wrap");

        function applyTheme(isLight) {
          if (isLight) {
            body.classList.add("light-mode");
            body.classList.remove("bg-slate-950", "text-slate-100");
            body.classList.add("bg-slate-50", "text-slate-900");
            if (themeToggle) {
              const labelSpan = themeToggle.querySelector("span:nth-child(2)");
              if (labelSpan) labelSpan.textContent = "Light mode";
            }
          } else {
            body.classList.remove("light-mode");
            body.classList.remove("bg-slate-50", "text-slate-900");
            body.classList.add("bg-slate-950", "text-slate-100");
            if (themeToggle) {
              const labelSpan = themeToggle.querySelector("span:nth-child(2)");
              if (labelSpan) labelSpan.textContent = "Dark mode";
            }
          }
        }

        let isLight = false;
        applyTheme(isLight);

        if (themeToggle) {
          themeToggle.addEventListener("click", () => {
            isLight = !isLight;
            applyTheme(isLight);
          });
        }

        if (contactButton) {
          contactButton.addEventListener("click", () => {
            alert(
              "Thanks for reaching out! You can contact me at: your-email@example.com"
            );
          });
        }

        // Welcome -> fade out overlay + slide up link tree
        if (welcomeOverlay && enterButton && linkTree) {
          enterButton.addEventListener("click", () => {
            welcomeOverlay.classList.add("opacity-0", "pointer-events-none");
            // Slide up existing structure after overlay starts fading out
            linkTree.classList.remove("translate-y-8", "opacity-0");
            linkTree.classList.add("translate-y-0", "opacity-100");

            // Remove overlay from layout/tab order after transition
            window.setTimeout(() => {
              welcomeOverlay.classList.add("hidden");
            }, 750);
          });
        }

        // Subtle mouse-follow interaction for the 3D element
        if (splineWrap && !("ontouchstart" in window)) {
          let targetX = 0;
          let targetY = 0;
          let currentX = 0;
          let currentY = 0;

          const maxTranslate = 10; // px
          const maxRotate = 6; // deg

          window.addEventListener(
            "mousemove",
            (event) => {
              const x = event.clientX / window.innerWidth - 0.5;
              const y = event.clientY / window.innerHeight - 0.5;
              targetX = x;
              targetY = y;
            },
            { passive: true }
          );

          const animate = () => {
            currentX += (targetX - currentX) * 0.08;
            currentY += (targetY - currentY) * 0.08;

            splineWrap.style.transform = `translate3d(${currentX * maxTranslate}px, ${currentY * maxTranslate}px, 0) rotateX(${(-currentY * maxRotate).toFixed(
              2
            )}deg) rotateY(${(currentX * maxRotate).toFixed(2)}deg)`;

            window.requestAnimationFrame(animate);
          };

          window.requestAnimationFrame(animate);
        }
      });
    </script>
  </body>
</html>
